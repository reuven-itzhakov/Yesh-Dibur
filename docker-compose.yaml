version: '3.8'

services:
  # מסד הנתונים הראשי הכולל את הרחבת המיקום (PostGIS)
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: Yesh-Dibur_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: Yesh-Dibur_user
      POSTGRES_PASSWORD: Yesh-Dibur_password
      POSTGRES_DB: Yesh-Dibur_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - Yesh-Dibur_net

  # שרת תורי המשימות (כולל ממשק ניהול ויזואלי)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: Yesh-Dibur_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # פורט התקשורת של השרת
      - "15672:15672" # פורט ממשק הניהול בדפדפן
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - Yesh-Dibur_net

  # שרת המטמון והתיווך עבור ה-WebSockets
  redis:
    image: redis:7-alpine
    container_name: Yesh-Dibur_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - Yesh-Dibur_net

# הגדרת ווליומים לשמירת הנתונים גם כשהקונטיינר נכבה
volumes:
  pgdata:
  rabbitmq_data:
  redis_data:

# הגדרת רשת פנימית כדי שהקונטיינרים יוכלו לדבר אחד עם השני במידת הצורך
networks:
  Yesh-Dibur_net:
    driver: bridge