name: yesh_dibur_frontend_flutter
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.4.9
  
  # Routing
  go_router: ^13.2.0
  
  # Network & API
  dio: ^5.4.0
  socket_io_client: ^2.0.3
  
  # Models & JSON (Data Layer)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Local Storage & Environment
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0 # לניהול משתני סביבה (env.)
  
  # UI & Media
  image_picker: ^1.0.7
  flutter_animate: ^4.5.0
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Firebase Services (הוסף בהמשך כשנחבר את הפרויקט ב-Firebase)
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  firebase_storage: ^13.4.5
  firebase_crashlytics: ^5.2.6
  firebase_analytics: ^12.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation for Freezed & JSON
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.9.5
flutter:
  uses-material-design: true
  assets:
    - ./.env
